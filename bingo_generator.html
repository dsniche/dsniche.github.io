@import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");

:root {
  --main-color: #5d1725;
}

*::-webkit-scrollbar {
  width: 6px;
}

html {
  font-family: "Poppins", sans-serif;
  background: #5d1725;
  display: grid;
  place-items: center;
}

body {
  padding: 0;
  margin: 0;
  max-width: 900px;
}

#bingo_card,
#clone_card {
  background: url("/img/bg.png");
  background-size: cover;
  background-repeat: no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 1.75rem;
}

#clone_card {
  padding: 0;
}

h1 {
  color: #fff;
  font-weight: 700;
  text-align: center;
  font-size: 60pt;
}

#clone_card h1 {
  font-size: 60pt !important;
}

#container {
  border: 3px solid #000;
  width: fit-content;
}

#clone_card #container {
  border: 3px solid #000 !important;
}

#bingo_spots,
h1 {
  display: grid;
  grid-template-columns: repeat(5, 130px);
  place-content: center;
  margin: auto;
}

#clone_card #bingo_spots, #clone_card h1 {
  grid-template-columns: repeat(5, 130px) !important;
}

.spot {
  background: #fff;
  aspect-ratio: 1 / 1;
}

.bingo,
.bingo img {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  background: #fff;
  font-size: 50pt;
  font-weight: 700;
  cursor: pointer;
  border: 3px solid #000;
}

#clone_card .bingo {
  border: 3px solid #000 !important;
  font-size: 50pt !important;
}

.bingo img {
  background: transparent;
  border: none;
  display: block;
}

.free {
  padding: 0.5rem;
}

#clone_card .free {
  padding: 0.5rem !important;
}

.checked {
  background: var(--main-color) !important;
  color: #fff !important;
}

.flex {
  display: flex;
  justify-content: center;
  align-items: center;
}

#colors {
  display: flex;
  gap: 2rem;
  margin-top: 1.25rem;
  padding-bottom: 0.5rem;
}

#monochrome {
  margin-top: 2.5rem;
}

#colors button {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.6);
  transition: 0.4s ease;
  border: 6px outset #c0c0c0;
}

#colors img {
  max-width: 60px;
  display: block;
}

#colors button:hover,
#colors img:hover {
  filter: drop-shadow(2px 2px #00000080) brightness(90%);
}

.active img {
  filter: invert(1);
}

.active button {
  border: 6px outset #fff !important;
}

.active img:hover {
  filter: invert(1) !important;
}

dialog {
  box-shadow: rgba(0, 0, 0, 0.4) 0px 2px 4px,
    rgba(0, 0, 0, 0.3) 0px 7px 13px -3px, rgba(0, 0, 0, 0.2) 0px -3px 0px inset;
  border: 2px solid #14141440;
  border-radius: 6px;
  text-align: center;
  padding: 1rem;
}

dialog h1 {
  margin-top: 1rem;
  margin-bottom: 0.3rem;
  font-weight: bold;
  font-size: 18pt;
  background: linear-gradient(to left, #1e1d1d, #484849, #1e1d1d);
  color: #fff;
  padding: 0.2rem 0.7rem;
  border-radius: 4px;
  text-align: left;
  display: block;
}

dialog::backdrop {
  background-color: #00000090;
  backdrop-filter: blur(5px);
}
